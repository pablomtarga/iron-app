<style>
:root{
  --bg:#F4F5F7; --panel:#FFFFFF; --panel2:#F1F2F5; --line:#E5E8EC;
  --ink:#14181F; --muted:#667085; --muted2:#98A2B3;
  --viz1:#1A1C20; --viz2:#0C0D10;
  --shadow:0 1px 2px rgba(16,24,40,.05),0 6px 16px -6px rgba(16,24,40,.10);
  --green:#12805C; --red:#D92D20;
  --accent:#F5B301; --accent-ink:#181818; --accent-text:#9A6B00;
}
html[data-theme=dark]{
  --bg:#0B0C0E; --panel:#16181C; --panel2:#1E2127; --line:#2A2E36;
  --ink:#F2F3F5; --muted:#9AA1AB; --muted2:#6B7280;
  --shadow:0 1px 2px rgba(0,0,0,.4),0 8px 20px -8px rgba(0,0,0,.55);
  --green:#39D98A; --red:#FF6B6B;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--ink);font-family:'Manrope',sans-serif;
  overflow-x:hidden;padding-bottom:118px;-webkit-text-size-adjust:100%;
  transition:background .3s,color .3s}
.wrap{position:relative;z-index:2;max-width:560px;margin:0 auto}

/* ---------- HEADER ---------- */
header{padding:calc(16px + env(safe-area-inset-top)) 18px 6px}
.htop{display:flex;justify-content:space-between;align-items:center;gap:10px}
.brand{display:flex;align-items:center;gap:9px}
.brand .logo{width:36px;height:36px;border-radius:11px;background:var(--accent);
  display:flex;align-items:center;justify-content:center;box-shadow:var(--shadow);transition:background .3s}
.brand .logo svg{width:20px;height:20px}
.brand b{font-family:'Anton';font-size:21px;letter-spacing:.04em}
.brand small{display:block;color:var(--muted);font-size:9.5px;letter-spacing:.14em;
  text-transform:uppercase;font-weight:800;margin-top:-2px}
.hbtns{display:flex;gap:8px;align-items:center}
.thm{width:38px;height:38px;border-radius:11px;border:1px solid var(--line);background:var(--panel);
  color:var(--ink);cursor:pointer;font-size:16px;box-shadow:var(--shadow)}
.datebox{background:var(--panel);border:1px solid var(--line);border-radius:12px;
  padding:6px 10px;text-align:right;box-shadow:var(--shadow)}
.datebox label{display:block;font-size:8.5px;letter-spacing:.14em;text-transform:uppercase;
  color:var(--muted2);font-weight:800;margin-bottom:1px}
.datebox input{background:none;border:none;color:var(--ink);font-family:'Manrope';
  font-weight:800;font-size:13px;text-align:right;width:112px;color-scheme:light}
html[data-theme=dark] .datebox input{color-scheme:dark}
.hello{margin-top:14px;font-family:'Anton';font-size:clamp(28px,8.6vw,40px);
  line-height:.95;text-transform:uppercase}
.hello em{color:var(--accent-text);font-style:normal;transition:color .3s}
.quote{color:var(--muted);font-size:12.5px;font-weight:600;margin-top:5px;min-height:18px}

.install{margin:12px 16px 0;background:var(--panel);border:1px dashed var(--accent);
  border-radius:14px;padding:11px 13px;display:flex;gap:10px;align-items:flex-start;box-shadow:var(--shadow)}
.install .ic{font-size:17px}
.install p{font-size:12px;line-height:1.5;color:var(--muted);flex:1}
.install p b{color:var(--ink)}
.install button{border:none;background:none;color:var(--muted2);font-size:15px;cursor:pointer;padding:2px}

/* ---------- TABS ---------- */
.tabs{position:sticky;top:0;z-index:30;display:flex;gap:8px;padding:12px 16px 10px;
  background:linear-gradient(180deg,var(--bg) 76%,transparent)}
.tab{flex:1;border:1px solid var(--line);background:var(--panel);border-radius:15px;
  padding:10px 4px;cursor:pointer;transition:.2s;position:relative;box-shadow:var(--shadow)}
.tab .ltr{font-family:'Anton';font-size:17px;line-height:1;color:var(--muted)}
.tab .nm{font-size:9px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;
  color:var(--muted2);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tab.on{background:var(--accent);border-color:var(--accent);transform:translateY(-1px)}
.tab.on .ltr,.tab.on .nm{color:var(--accent-ink)}

/* ---------- PROGRESS ---------- */
.prog{margin:2px 16px 8px;background:var(--panel);border:1px solid var(--line);
  border-radius:16px;padding:13px 15px;box-shadow:var(--shadow)}
.prog .row{display:flex;justify-content:space-between;align-items:center;margin-bottom:9px}
.prog .row .l{font-size:10.5px;letter-spacing:.12em;text-transform:uppercase;
  color:var(--muted);font-weight:800}
.prog .row .r{font-family:'Anton';font-size:16px}
.prog .row .r em{color:var(--accent-text);font-style:normal}
.bar{height:9px;border-radius:6px;background:var(--panel2);overflow:hidden}
.bar i{display:block;height:100%;width:0;border-radius:6px;background:var(--accent);
  transition:width .5s cubic-bezier(.2,.8,.2,1)}
.dintro{margin:2px 18px 10px;color:var(--muted);font-size:12.5px;line-height:1.55;font-weight:500}

/* ordem do treino */
.order{margin:0 16px 14px;background:var(--panel);border:1px solid var(--line);
  border-radius:16px;box-shadow:var(--shadow);overflow:hidden}
.order>button{width:100%;background:none;border:none;color:var(--ink);font-family:'Manrope';
  font-weight:800;font-size:13px;padding:13px 15px;cursor:pointer;display:flex;
  align-items:center;gap:8px;text-align:left}
.order>button .cv{margin-left:auto;color:var(--accent-text);transition:.3s}
.order>button.op .cv{transform:rotate(180deg)}
.order .bd{max-height:0;overflow:hidden;transition:max-height .45s ease}
.order .bd.op{max-height:1200px}
.order .bd-i{padding:0 15px 14px}
.order .oi{display:flex;gap:10px;padding:8px 0;border-top:1px solid var(--line)}
.order .oi .n{flex:0 0 22px;height:22px;border-radius:7px;background:var(--accent);color:var(--accent-ink);
  font-weight:800;font-size:11px;display:flex;align-items:center;justify-content:center;margin-top:1px}
.order .oi .tx b{display:block;font-size:12.5px;font-weight:800}
.order .oi .tx span{font-size:11.5px;color:var(--muted);line-height:1.45}

/* ---------- EXERCISE CARD ---------- */
.list{padding:2px 14px 8px;display:flex;flex-direction:column;gap:14px}
.card{background:var(--panel);border:1px solid var(--line);border-radius:20px;overflow:hidden;
  box-shadow:var(--shadow);opacity:0;transform:translateY(12px);animation:rise .45s forwards}
.card.done{border-color:var(--accent)}
@keyframes rise{to{opacity:1;transform:none}}
.ssband{height:3px;background:repeating-linear-gradient(90deg,var(--accent) 0 14px,transparent 14px 26px)}
.ctop{display:flex;gap:13px;padding:15px 15px 10px}
.viz{flex:0 0 96px;width:96px;height:96px;border-radius:15px;
  background:radial-gradient(120% 120% at 35% 12%,var(--viz1),var(--viz2));overflow:hidden;position:relative}
.viz svg{width:100%;height:100%}
.cinfo{flex:1;min-width:0}
.cidx{display:flex;align-items:center;gap:7px;flex-wrap:wrap}
.cidx .n{font-family:'Anton';font-size:12px;color:var(--accent-text)}
.badge{font-size:8.5px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;
  padding:3px 7px;border-radius:6px}
.badge.ss{background:var(--panel2);border:1px solid var(--accent);color:var(--accent-text)}
.cname{font-family:'Anton';font-size:20px;line-height:1.02;margin:3px 0 7px;text-transform:uppercase}
.meta{display:flex;gap:6px;flex-wrap:wrap}
.chip{font-size:10.5px;font-weight:700;padding:4px 9px;border-radius:8px;
  background:var(--panel2);border:1px solid var(--line);color:var(--ink)}
.chip b{color:var(--accent-text)}
.vars{display:flex;gap:7px;overflow-x:auto;padding:2px 15px 10px;scrollbar-width:none}
.vars::-webkit-scrollbar{display:none}
.vlab{flex:0 0 auto;font-size:9px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;
  color:var(--muted2);align-self:center;padding-right:2px}
.vchip{flex:0 0 auto;border:1.5px solid var(--line);background:var(--panel2);color:var(--muted);
  font-family:'Manrope';font-weight:700;font-size:11.5px;padding:7px 12px;border-radius:999px;
  cursor:pointer;transition:.18s;white-space:nowrap}
.vchip.on{background:var(--accent);border-color:var(--accent);color:var(--accent-ink)}
.wt{display:flex;align-items:stretch;gap:8px;padding:0 15px 4px}
.wt .stp{display:flex;align-items:center;background:var(--panel2);border:1px solid var(--line);
  border-radius:13px;overflow:hidden;flex:1}
.wt .stp button{width:46px;border:none;background:none;color:var(--ink);font-size:22px;
  font-weight:700;cursor:pointer;padding:11px 0;transition:.15s}
.wt .stp button:active{background:var(--line)}
.wt .stp .val{flex:1;text-align:center;cursor:text}
.wt .stp .val .num{font-family:'Anton';font-size:25px;line-height:1}
.wt .stp .val .u{font-size:11px;color:var(--muted);font-weight:700;margin-left:2px}
.wt .stp .val input{width:78px;background:var(--panel);border:1.5px solid var(--accent);border-radius:8px;
  color:var(--ink);font-family:'Anton';font-size:22px;text-align:center;padding:2px}
.wt .rest{flex:0 0 auto;border:1px solid var(--line);background:var(--panel2);border-radius:13px;
  padding:0 14px;display:flex;flex-direction:column;align-items:center;justify-content:center;
  cursor:pointer;transition:.15s;min-width:62px}
.wt .rest:active{background:var(--line)}
.wt .rest .t{font-family:'Anton';font-size:17px;line-height:1;color:var(--accent-text)}
.wt .rest .lb{font-size:8px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted2);font-weight:800}
.lastw{padding:5px 17px 2px;font-size:10.5px;color:var(--muted2);font-weight:600}
.sets{padding:6px 15px 12px}
.sets .lab{font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);
  font-weight:800;margin-bottom:7px;display:flex;justify-content:space-between}
.sets .lab span:last-child{color:var(--accent-text);font-family:'Anton';font-size:13px;letter-spacing:0}
.dots{display:flex;gap:8px;flex-wrap:wrap}
.dot{flex:1;min-width:44px;height:44px;border-radius:12px;border:1.5px solid var(--line);
  background:var(--panel2);cursor:pointer;display:flex;align-items:center;justify-content:center;
  font-family:'Anton';font-size:15px;color:var(--muted2);transition:.18s;user-select:none}
.dot.fill{background:var(--accent);color:var(--accent-ink);border-color:var(--accent);transform:scale(1.03)}
.dot.fill::before{content:"✓";font-size:17px}
.dot.fill span{display:none}
.drnote{margin:0 15px 10px;background:var(--panel2);border:1px solid var(--line);
  border-left:3px solid var(--accent);border-radius:12px;padding:10px 12px;display:flex;gap:9px}
.drnote .ic{flex:0 0 auto;font-size:14px}
.drnote p{font-size:11.5px;line-height:1.5;color:var(--muted);font-weight:500}
.acts{display:flex;gap:8px;padding:0 15px 15px}
.abtn{flex:1;display:flex;align-items:center;justify-content:center;gap:7px;
  border:1px solid var(--line);background:var(--panel2);border-radius:12px;padding:11px;
  color:var(--ink);font-family:'Manrope';font-weight:800;font-size:12px;cursor:pointer;
  text-decoration:none;transition:.15s}
.abtn:active{background:var(--line)}
.abtn.vid{background:var(--accent);border-color:var(--accent);color:var(--accent-ink)}
.abtn .cv{color:inherit;transition:.3s;font-size:11px}
.abtn.op .cv{transform:rotate(180deg)}
.how{max-height:0;overflow:hidden;transition:max-height .4s ease;margin:0 15px}
.how.op{max-height:560px;margin-bottom:15px}
.how-i{padding:2px 0 4px;border-top:1px solid var(--line)}
.how ol{list-style:none;counter-reset:s;display:flex;flex-direction:column;gap:8px;margin:12px 0}
.how ol li{counter-increment:s;position:relative;padding-left:28px;font-size:13px;line-height:1.5;color:var(--ink);font-weight:500}
.how ol li::before{content:counter(s);position:absolute;left:0;top:0;width:20px;height:20px;
  border-radius:6px;background:var(--accent);color:var(--accent-ink);font-weight:800;font-size:11px;
  display:flex;align-items:center;justify-content:center}
.cue{display:flex;gap:8px;font-size:12px;line-height:1.45;padding:8px 0;border-top:1px dashed var(--line);font-weight:600}
.cue.g{color:var(--green)}.cue.b{color:var(--red)}
.cue b{font-weight:800}
.fin{margin:18px 16px 6px}
.fin button{width:100%;border:1px solid var(--line);border-radius:16px;padding:17px;font-family:'Anton';
  font-size:19px;letter-spacing:.03em;text-transform:uppercase;cursor:pointer;transition:.2s;
  background:var(--panel);color:var(--muted);box-shadow:var(--shadow)}
.fin button.ready{background:var(--accent);color:var(--accent-ink);border-color:var(--accent)}
.fin button.ready:active{transform:scale(.985)}

/* ---------- PROGRESSO ---------- */
.pv{padding:6px 16px 8px}
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:14px}
.stat{background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:14px 10px;
  text-align:center;box-shadow:var(--shadow)}
.stat .v{font-family:'Anton';font-size:29px;line-height:1;color:var(--accent-text)}
.stat .k{font-size:9px;letter-spacing:.09em;text-transform:uppercase;color:var(--muted);font-weight:800;margin-top:4px}
.week{background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:14px;
  margin-bottom:16px;box-shadow:var(--shadow)}
.week h4{font-size:10.5px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);font-weight:800;margin-bottom:11px}
.days{display:flex;justify-content:space-between;gap:5px}
.day{flex:1;text-align:center}
.day .ball{height:36px;border-radius:10px;background:var(--panel2);border:1px solid var(--line);
  display:flex;align-items:center;justify-content:center;font-family:'Anton';font-size:12px;color:var(--muted2)}
.day .ball.hit{background:var(--accent);color:var(--accent-ink);border-color:var(--accent)}
.day .ball.today{border-color:var(--accent);border-width:2px}
.day small{display:block;font-size:9px;color:var(--muted2);font-weight:800;margin-top:4px}
.sectit{font-family:'Anton';font-size:16px;text-transform:uppercase;margin:4px 2px 10px;
  display:flex;justify-content:space-between;align-items:center}
.sectit button{background:var(--panel);border:1px solid var(--line);color:var(--muted);border-radius:9px;
  font-size:10px;font-weight:800;padding:6px 10px;cursor:pointer;font-family:'Manrope'}
.hist{display:flex;flex-direction:column;gap:9px}
.hrow{background:var(--panel);border:1px solid var(--line);border-radius:13px;padding:12px 14px;
  display:flex;align-items:center;gap:12px;box-shadow:var(--shadow)}
.hrow .wk{width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;
  font-family:'Anton';font-size:17px;flex:0 0 auto;color:#181818}
.hrow .mid{flex:1;min-width:0}
.hrow .mid b{font-size:13px;font-weight:800}
.hrow .mid small{display:block;color:var(--muted);font-size:11px;margin-top:1px}
.hrow .pct{font-family:'Anton';font-size:15px;color:var(--accent-text)}
.empty{text-align:center;color:var(--muted2);font-size:13px;padding:26px 10px;line-height:1.55;font-weight:600}
.exports{display:flex;gap:8px;margin:0 0 16px}
.exports .abtn{padding:13px;font-size:12.5px}
.tips{margin-top:18px}
.tip{background:var(--panel);border:1px solid var(--line);border-radius:13px;padding:12px 14px;
  margin-bottom:9px;display:flex;gap:10px;box-shadow:var(--shadow)}
.tip .ic{flex:0 0 auto;width:27px;height:27px;border-radius:8px;background:var(--panel2);
  display:flex;align-items:center;justify-content:center;font-size:13px}
.tip p{font-size:12px;line-height:1.5;color:var(--muted);font-weight:500}
.tip b{color:var(--ink)}

/* ---------- TIMER ---------- */
.tmr{position:fixed;left:14px;right:14px;bottom:calc(86px + env(safe-area-inset-bottom));z-index:60;
  background:var(--ink);color:var(--bg);border-radius:18px;padding:13px 16px;display:none;
  align-items:center;gap:14px;box-shadow:0 18px 50px -14px rgba(0,0,0,.45);max-width:532px;margin:0 auto}
html[data-theme=dark] .tmr{background:#fff;color:#111}
.tmr.show{display:flex;animation:rise .3s}
.tmr .big{font-family:'Anton';font-size:36px;line-height:1;min-width:92px;color:var(--accent)}
.tmr .info{flex:1}
.tmr .info b{font-size:13px;font-weight:800}
.tmr .info small{display:block;opacity:.65;font-size:11px}
.tmr .x{width:40px;height:40px;border-radius:11px;border:none;background:rgba(128,128,128,.18);
  color:inherit;font-size:17px;cursor:pointer}
.tmr .ring{position:absolute;left:0;bottom:0;height:3px;background:var(--accent);border-radius:2px;transition:width 1s linear}

/* ---------- NAV ---------- */
.nav{position:fixed;left:0;right:0;bottom:0;z-index:50;
  padding:8px 16px calc(10px + env(safe-area-inset-bottom));
  background:linear-gradient(0deg,var(--bg) 62%,transparent);display:flex;gap:10px;justify-content:center}
.nav button{flex:1;max-width:266px;border:1px solid var(--line);background:var(--panel);border-radius:15px;
  padding:11px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;
  color:var(--muted);transition:.2s;box-shadow:var(--shadow)}
.nav button.on{background:var(--accent);color:var(--accent-ink);border-color:var(--accent)}
.nav button svg{width:21px;height:21px}
.nav button span{font-size:10px;font-weight:800;letter-spacing:.06em;text-transform:uppercase}

/* toast + confete */
.toast{position:fixed;left:50%;bottom:158px;transform:translateX(-50%) translateY(20px);
  background:var(--ink);color:var(--bg);font-weight:800;font-size:13px;padding:11px 18px;
  border-radius:12px;z-index:130;opacity:0;transition:.3s;pointer-events:none;white-space:nowrap;
  box-shadow:0 10px 30px -8px rgba(0,0,0,.35)}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.cfx{position:fixed;inset:0;z-index:80;pointer-events:none;overflow:hidden}
.cf{position:absolute;width:9px;height:14px;top:-20px;border-radius:2px;animation:fall linear forwards}
@keyframes fall{to{transform:translateY(110vh) rotate(720deg);opacity:.2}}

/* ---------- MODAIS ---------- */
.modal-ov{position:fixed;inset:0;background:rgba(8,10,14,.55);z-index:75;display:flex;
  align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(3px)}
.modal{background:var(--panel);border:1px solid var(--line);border-radius:20px;max-width:380px;
  width:100%;padding:20px;box-shadow:0 24px 60px -20px rgba(0,0,0,.5)}
.modal h3{font-family:'Anton';font-size:18px;text-transform:uppercase;margin-bottom:4px}
.modal .sub{font-size:12px;color:var(--muted);font-weight:600;margin-bottom:14px;line-height:1.5}
.modal input{width:100%;background:var(--panel2);border:1.5px solid var(--line);border-radius:12px;
  padding:13px 14px;color:var(--ink);font-family:'Manrope';font-weight:600;font-size:14px;margin-bottom:9px}
.modal input:focus{outline:none;border-color:var(--accent)}
.modal .mrow{display:flex;gap:8px;margin-top:4px}
.modal .mbtn{flex:1;border:1px solid var(--line);background:var(--panel2);color:var(--ink);
  border-radius:12px;padding:13px;font-family:'Manrope';font-weight:800;font-size:13px;cursor:pointer}
.modal .mbtn.pri{background:var(--accent);border-color:var(--accent);color:var(--accent-ink)}
.modal .merr{color:var(--red);font-size:12px;font-weight:700;min-height:16px;margin-top:8px}
.modal .mfoot{margin-top:12px;text-align:center}
.modal .mfoot button{background:none;border:none;color:var(--muted2);font-size:12px;font-weight:700;cursor:pointer}
.modal .who{background:var(--panel2);border:1px solid var(--line);border-radius:12px;padding:12px;
  font-size:13px;font-weight:700;margin-bottom:10px;word-break:break-all}
.modal .who small{display:block;color:var(--muted);font-weight:600;font-size:11px;margin-top:3px}

/* ---------- ONBOARDING ---------- */
#ob{position:fixed;inset:0;z-index:100;background:var(--bg);overflow-y:auto;
  padding:calc(20px + env(safe-area-inset-top)) 18px calc(30px + env(safe-area-inset-bottom))}
.ob-in{max-width:560px;margin:0 auto}
.ob-steps{display:flex;gap:6px;margin-bottom:22px}
.ob-steps i{flex:1;height:4px;border-radius:3px;background:var(--panel2)}
.ob-steps i.on{background:var(--accent)}
.ob-hero{text-align:center;padding:34px 6px 10px}
.ob-hero .logo{width:74px;height:74px;border-radius:22px;background:var(--accent);margin:0 auto 18px;
  display:flex;align-items:center;justify-content:center;box-shadow:var(--shadow)}
.ob-hero .logo svg{width:42px;height:42px}
.ob-hero h1{font-family:'Anton';font-size:38px;text-transform:uppercase;line-height:1}
.ob-hero h1 em{color:var(--accent-text);font-style:normal}
.ob-hero p{color:var(--muted);font-size:14px;font-weight:600;line-height:1.6;margin:12px auto 26px;max-width:420px}
.ob-cta{display:flex;flex-direction:column;gap:10px;max-width:420px;margin:0 auto}
.ob-btn{border:1px solid var(--line);background:var(--panel);color:var(--ink);border-radius:15px;
  padding:16px;font-family:'Manrope';font-weight:800;font-size:14.5px;cursor:pointer;box-shadow:var(--shadow)}
.ob-btn.pri{background:var(--accent);border-color:var(--accent);color:var(--accent-ink);
  font-family:'Anton';font-size:18px;letter-spacing:.03em;text-transform:uppercase}
.ob-btn.ghost{background:none;border:none;box-shadow:none;color:var(--muted2);font-size:12.5px;padding:8px}
.ob h2{font-family:'Anton';font-size:24px;text-transform:uppercase;margin-bottom:4px}
.ob .lead{color:var(--muted);font-size:12.5px;font-weight:600;line-height:1.55;margin-bottom:18px}
.qb{background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:15px;
  margin-bottom:13px;box-shadow:var(--shadow)}
.qb h4{font-size:13px;font-weight:800;margin-bottom:3px}
.qb .hint{font-size:11px;color:var(--muted2);font-weight:600;margin-bottom:11px;line-height:1.45}
.qchips{display:flex;flex-wrap:wrap;gap:8px}
.qchip{border:1.5px solid var(--line);background:var(--panel2);color:var(--muted);border-radius:999px;
  padding:9px 14px;font-family:'Manrope';font-weight:700;font-size:12.5px;cursor:pointer;transition:.15s}
.qchip.on{background:var(--accent);border-color:var(--accent);color:var(--accent-ink)}
.ob-nav{display:flex;gap:10px;margin-top:20px}
.ob-nav .ob-btn{flex:1}

/* revisão */
.rday{background:var(--panel);border:1px solid var(--line);border-radius:18px;margin-bottom:14px;
  box-shadow:var(--shadow);overflow:hidden}
.rday .rhead{display:flex;align-items:center;gap:11px;padding:14px 15px;border-bottom:1px solid var(--line)}
.rday .rhead .lt{width:38px;height:38px;border-radius:11px;display:flex;align-items:center;
  justify-content:center;font-family:'Anton';font-size:19px;color:#181818}
.rday .rhead .tx b{display:block;font-family:'Anton';font-size:16px;text-transform:uppercase}
.rday .rhead .tx small{color:var(--muted);font-size:11px;font-weight:700}
.rex{display:flex;align-items:center;gap:10px;padding:11px 15px;border-bottom:1px solid var(--line)}
.rex:last-of-type{border-bottom:none}
.rex .rn{flex:0 0 20px;height:20px;border-radius:6px;background:var(--panel2);color:var(--muted);
  font-weight:800;font-size:10.5px;display:flex;align-items:center;justify-content:center}
.rex .rtx{flex:1;min-width:0}
.rex .rtx b{display:block;font-size:13px;font-weight:800;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.rex .rtx small{color:var(--muted2);font-size:10.5px;font-weight:700}
.rex .rx{width:32px;height:32px;border-radius:9px;border:1px solid var(--line);background:var(--panel2);
  color:var(--muted);cursor:pointer;font-size:13px}
.radd{width:calc(100% - 30px);margin:11px 15px 14px;border:1.5px dashed var(--line);background:none;
  color:var(--muted);border-radius:12px;padding:11px;font-family:'Manrope';font-weight:800;
  font-size:12px;cursor:pointer}
/* picker */
#pickOv{z-index:120}
#acctOv{z-index:120}
.brand{cursor:pointer}
.pick{max-width:420px;max-height:82vh;display:flex;flex-direction:column}
.pick .pgrid{overflow-y:auto;margin:6px -4px 0;padding:0 4px}
.pchips{display:flex;gap:7px;overflow-x:auto;padding-bottom:10px;scrollbar-width:none}
.pchips::-webkit-scrollbar{display:none}
.prow{display:flex;align-items:center;gap:10px;padding:10px 2px;border-bottom:1px solid var(--line)}
.prow .rtx{flex:1;min-width:0}
.prow .rtx b{display:block;font-size:13px;font-weight:800}
.prow .rtx small{color:var(--muted2);font-size:10.5px;font-weight:700}
.prow .padd{width:34px;height:34px;border-radius:10px;border:none;background:var(--accent);
  color:var(--accent-ink);font-size:17px;font-weight:800;cursor:pointer}

.ob-name{display:block;width:100%;max-width:420px;margin:0 auto 14px;background:var(--panel);
  border:1.5px solid var(--line);border-radius:14px;padding:14px 16px;color:var(--ink);
  font-family:'Manrope';font-weight:700;font-size:15px;text-align:center;box-shadow:var(--shadow)}
.ob-name:focus{outline:none;border-color:var(--accent)}
.qb .ob-name{max-width:100%;text-align:left;margin:0;box-shadow:none;background:var(--panel2)}
.wkhead{font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted2);
  font-weight:800;margin:14px 2px 6px}
.wkhead:first-child{margin-top:0}
.hrow{cursor:pointer}
.hrow .hcv{color:var(--muted2);font-size:11px;transition:.3s;margin-left:2px}
.hrow.op .hcv{transform:rotate(180deg)}
.hdetail{display:none;background:var(--panel);border:1px solid var(--line);border-top:none;
  border-radius:0 0 13px 13px;margin:-9px 0 0;padding:6px 14px 10px;box-shadow:var(--shadow)}
.hdetail.op{display:block}
.hd-row{display:flex;justify-content:space-between;align-items:center;gap:10px;
  padding:8px 0;border-bottom:1px dashed var(--line);font-size:12px}
.hd-row:last-child{border-bottom:none}
.hd-row span{font-weight:700}
.hd-row small{color:var(--muted);font-weight:700;white-space:nowrap}
/* séries com peso individual */
.prev{margin:6px 17px 2px;font-size:11px;color:var(--muted2);font-weight:700}
.prev b{color:var(--accent-text);font-weight:800}
.srows{display:flex;flex-direction:column;gap:7px}
.srow{display:flex;align-items:center;gap:10px;background:var(--panel2);border:1.5px solid var(--line);
  border-radius:13px;padding:7px 10px;transition:border-color .2s,background .2s}
.srow.done{border-color:var(--accent);background:color-mix(in srgb,var(--accent) 9%,var(--panel2))}
.snum{flex:0 0 24px;height:24px;border-radius:8px;background:var(--panel);border:1px solid var(--line);
  color:var(--muted);font-weight:800;font-size:11px;display:flex;align-items:center;justify-content:center}
.srow.done .snum{background:var(--accent);border-color:var(--accent);color:var(--accent-ink)}
.swt{flex:1;text-align:center;cursor:text;font-family:'Anton';font-size:19px;line-height:1}
.swt .u{font-size:10px;color:var(--muted);font-family:'Manrope';font-weight:700;margin-left:3px}
.swt.bwlab{font-size:13px;color:var(--muted);font-family:'Manrope';font-weight:800;letter-spacing:.04em;text-transform:uppercase;cursor:default}
.swt input{width:70px;background:var(--panel);border:1.5px solid var(--accent);border-radius:8px;
  color:var(--ink);font-family:'Anton';font-size:18px;text-align:center;padding:2px}
.schk{flex:0 0 42px;height:42px;border-radius:12px;border:1.5px solid var(--line);background:var(--panel);
  color:var(--muted2);font-size:16px;cursor:pointer;transition:.18s}
.schk.on{background:var(--accent);border-color:var(--accent);color:var(--accent-ink);transform:scale(1.04)}
/* modo edição do treino */
.editrow{margin:0 16px 12px}
.editbtn{width:100%;border:1.5px dashed var(--line);background:none;color:var(--muted);border-radius:13px;
  padding:12px;font-family:'Manrope';font-weight:800;font-size:12.5px;cursor:pointer;transition:.2s}
.editbtn.on{border-style:solid;background:var(--accent);border-color:var(--accent);color:var(--accent-ink)}
.ebar{display:flex;gap:7px;padding:11px 15px 0}
.ebtn{border:1px solid var(--line);background:var(--panel2);color:var(--ink);border-radius:10px;
  padding:9px 11px;font-family:'Manrope';font-weight:800;font-size:12px;cursor:pointer}
.ebtn:disabled{opacity:.35;cursor:default}
.ebtn.wide{flex:1}
.ebtn.danger{color:var(--red);border-color:color-mix(in srgb,var(--red) 35%,var(--line))}
.radd.big{width:calc(100% - 4px);margin:2px 2px 6px;padding:15px;font-size:13px}
/* excluir registro do histórico */
.hdel{width:100%;margin-top:8px;border:1.5px dashed color-mix(in srgb,var(--red) 40%,var(--line));
  background:none;color:var(--red);border-radius:10px;padding:10px;font-family:'Manrope';
  font-weight:800;font-size:11.5px;cursor:pointer}
/* quality floor */
:where(button,a,input,[onclick]):focus-visible{outline:2px solid var(--accent);outline-offset:2px;border-radius:6px}
@media (prefers-reduced-motion:reduce){*,*::before,*::after{animation:none!important;transition:none!important}}
.hidden{display:none!important}
</style>
</head>
<body>

<script>// Biblioteca de figuras de exercício (SVG + CSS). viewBox 0 0 120 100.
// Cada figura: máquina (cinza) + corpo (amarelo, com volume) + parte animada.
// Prefixos únicos por exercício evitam colisão de @keyframes.
const COL = {
  body:'#FFD633', bodyDark:'#e0b800', skin:'#FFD633',
  frame:'#3a3a3a', frameFill:'#1c1c1c', pad:'#2c2c2c',
  stack:'#444', cable:'#7a7a7a', floor:'#2a2a2a', arrow:'rgba(255,214,51,.30)'
};

const FIG = {
/* ---------------- PUSH ---------------- */
// Chest Press — perfil, empurra para a frente (direita)
chestpress:`<svg viewBox="0 0 120 100"><style>
 .cp-arm{transform-origin:60px 44px;animation:cp 2s infinite ease-in-out}
 .cp-fore{transform-origin:48px 52px;animation:cpf 2s infinite ease-in-out}
 .cp-hand{transform-origin:60px 44px;animation:cph 2s infinite ease-in-out}
 @keyframes cp{0%,100%{transform:rotate(8deg)}50%{transform:rotate(-6deg)}}
 @keyframes cpf{0%,100%{transform:rotate(38deg)}50%{transform:rotate(2deg)}}
 @keyframes cph{0%,100%{transform:translateX(0)}50%{transform:translateX(16px)}}
</style>
<line x1="6" y1="92" x2="114" y2="92" stroke="${COL.floor}" stroke-width="3"/>
<!-- machine stack right -->
<rect x="96" y="40" width="16" height="48" rx="2" fill="${COL.frameFill}" stroke="${COL.frame}" stroke-width="1.5"/>
<rect x="98" y="44" width="12" height="20" rx="1" fill="${COL.stack}"/>
<g class="cp-hand"><rect x="84" y="40" width="6" height="20" rx="3" fill="${COL.cable}"/><line x1="90" y1="50" x2="98" y2="50" stroke="${COL.cable}" stroke-width="2"/></g>
<!-- seat + backrest -->
<rect x="30" y="64" width="26" height="8" rx="2" fill="${COL.pad}"/>
<rect x="28" y="30" width="8" height="40" rx="3" fill="${COL.pad}"/>
<rect x="40" y="86" width="4" height="6" fill="${COL.frame}"/>
<!-- body seated, profile -->
<g fill="none" stroke="${COL.body}" stroke-linecap="round">
 <line x1="42" y1="66" x2="62" y2="68" stroke-width="9"/> <!-- thigh -->
 <line x1="62" y1="68" x2="64" y2="86" stroke-width="8"/> <!-- shin -->
 <line x1="40" y1="44" x2="40" y2="66" stroke-width="11"/> <!-- torso -->
 <g class="cp-arm"><line x1="60" y1="44" x2="48" y2="52" stroke-width="7"/></g>
 <g class="cp-fore"><line x1="48" y1="52" x2="60" y2="58" stroke-width="6"/></g>
</g>
<circle cx="40" cy="34" r="8" fill="${COL.body}"/>
</svg>`,

// Pec Deck — frente, braços fecham
pecdeck:`<svg viewBox="0 0 120 100"><style>
 .pd-l{transform-origin:60px 46px;animation:pdl 2.2s infinite ease-in-out}
 .pd-r{transform-origin:60px 46px;animation:pdr 2.2s infinite ease-in-out}
 @keyframes pdl{0%,100%{transform:rotate(-42deg)}50%{transform:rotate(-6deg)}}
 @keyframes pdr{0%,100%{transform:rotate(42deg)}50%{transform:rotate(6deg)}}
</style>
<line x1="6" y1="92" x2="114" y2="92" stroke="${COL.floor}" stroke-width="3"/>
<rect x="54" y="70" width="12" height="6" rx="2" fill="${COL.pad}"/>
<rect x="58" y="40" width="4" height="34" fill="${COL.pad}"/>
<!-- pads that move -->
<g class="pd-l"><line x1="60" y1="46" x2="34" y2="54" stroke="${COL.cable}" stroke-width="3"/><rect x="28" y="48" width="7" height="14" rx="3" fill="${COL.stack}"/></g>
<g class="pd-r"><line x1="60" y1="46" x2="86" y2="54" stroke="${COL.cable}" stroke-width="3"/><rect x="85" y="48" width="7" height="14" rx="3" fill="${COL.stack}"/></g>
<g fill="none" stroke="${COL.body}" stroke-linecap="round">
 <line x1="60" y1="40" x2="60" y2="68" stroke-width="12"/>
 <g class="pd-l"><line x1="60" y1="46" x2="40" y2="52" stroke-width="7"/></g>
 <g class="pd-r"><line x1="60" y1="46" x2="80" y2="52" stroke-width="7"/></g>
</g>
<circle cx="60" cy="30" r="8" fill="${COL.body}"/>
</svg>`,

// Shoulder Press — frente, empurra para cima
shoulderpress:`<svg viewBox="0 0 120 100"><style>

<line x1="6" y1="92" x2="114" y2="92" stroke="${COL.floor}" stroke-width="3"/>
<rect x="52" y="72" width="16" height="7" rx="2" fill="${COL.pad}"/>

<g fill="none" stroke="${COL.body}" stroke-linecap="round">
 <line x1="60" y1="42" x2="60" y2="72" stroke-width="13"/>
 <g class="sp-l"><line x1="50" y1="46" x2="46" y2="24" stroke-width="7"/><circle cx="46" cy="22" r="3.5" fill="${COL.body}"/></g>
 <g class="sp-r"><line x1="70" y1="46" x2="74" y2="24" stroke-width="7"/><circle cx="74" cy="22" r="3.5" fill="${COL.body}"/></g>
</g>
<circle cx="60" cy="30" r="8" fill="${COL.body}"/>
</svg>`,

// Lateral Raise machine — frente, braços sobem pelos lados
lateralraise:`<svg viewBox="0 0 120 100"><style>
 .lr-l{transform-origin:50px 48px;animation:lrl 2.2s infinite ease-in-out}

<g fill="none" stroke="${COL.body}" stroke-linecap="round">

<circle cx="60" cy="32" r="8" fill="${COL.body}"/>

// Triceps Rope Pushdown — perfil, antebraço desce
triceps:`<svg viewBox="0 0 120 100"><style>
 .tr-fore{transform-origin:54px 52px;animation:trf 1.8s infinite ease-in-out}
 .tr-rope{animation:trr 1.8s infinite ease-in-out}
 @keyframes trf{0%,100%{transform:rotate(-58deg)}50%{transform:rotate(6deg)}}

<line x1="78" y1="14" x2="60" y2="40" stroke="${COL.cable}" stroke-width="2"/>
<g class="tr-rope"><line x1="58" y1="40" x2="58" y2="58" stroke="${COL.cable}" stroke-width="3"/></g>
<g fill="none" stroke="${COL.body}" stroke-linecap="round">
 <line x1="40" y1="44" x2="42" y2="74" stroke-width="11"/> <!-- torso -->
 <line x1="42" y1="74" x2="44" y2="90" stroke-width="9"/> <!-- leg -->
 <line x1="44" y1="46" x2="54" y2="52" stroke-width="7"/> <!-- upper arm -->
 <g class="tr-fore"><line x1="54" y1="52" x2="58" y2="40" stroke-width="6"/></g>
</g>
<circle cx="40" cy="34" r="8" fill="${COL.body}"/>
</svg>`,

// Abs full crunch — perfil, tronco sobe
absfull:`<svg viewBox="0 0 120 100"><style>

<line x1="6" y1="90" x2="114" y2="90" stroke="${COL.floor}" stroke-width="3"/>

/* ---------------- PULL ---------------- */
// Lat Pulldown — frente, barra desce
latpull:`<svg viewBox="0 0 120 100"><style>

<rect x="14" y="6" width="92" height="5" rx="2" fill="${COL.frame}"/>

<g class="lp-bar"><rect x="36" y="18" width="48" height="5" rx="2" fill="${COL.stack}"/></g>

<rect x="54" y="80" width="12" height="14" rx="2" fill="${COL.pad}"/>

<circle cx="60" cy="32" r="8" fill="${COL.body}"/>

// Seated Row — perfil, puxa para trás
seatedrow:`<svg viewBox="0 0 120 100"><style>

<line x1="6" y1="92" x2="114" y2="92" stroke="${COL.floor}" stroke-width="3"/>

<g class="sr-cable"><line x1="58" y1="56" x2="92" y2="56" stroke="${COL.cable}" stroke-width="2"/><rect x="54" y="52" width="5" height="9" rx="2" fill="${COL.stack}"/></g>
<g class="sr-torso">
 <line x1="42" y1="44" x2="42" y2="70" stroke="${COL.body}" stroke-width="11" stroke-linecap="round"/>
 <g class="sr-arm"><line x1="46" y1="50" x2="58" y2="56" stroke="${COL.body}" stroke-width="7" stroke-linecap="round"/></g>
 <circle cx="42" cy="34" r="8" fill="${COL.body}"/>
</g>
<line x1="44" y1="70" x2="64" y2="72" stroke="${COL.body}" stroke-width="9" stroke-linecap="round"/>
<line x1="64" y1="72" x2="66" y2="80" stroke="${COL.body}" stroke-width="8" stroke-linecap="round"/>
</svg>`,

// Low Row / Upper Back — perfil, puxa (variação mais baixa)
lowrow:`<svg viewBox="0 0 120 100"><style>
 .lw-arm{transform-origin:48px 52px;animation:lwa 2.1s infinite ease-in-out}

/* why genéricos por papel na ordem */
function whyFor(ex,idx,dayHasComp){
  if(ex.cat==='cardio')return 'Fecha o treino com gasto extra sem roubar energia da musculação (curto e por último de propósito).';
  if(ex.cat==='lomb')return 'A lombar estabiliza tudo. Se cansasse antes dos pesados, sua forma iria embora: estabilizador é sempre o último.';
  if(ex.cat==='core')return 'Core no fim de propósito: cansar o estabilizador antes dos exercícios pesados comprometeria sua execução.';
  if(ex.cat==='calf')return 'Não interfere em nenhum outro exercício, então vai pro fim. Responde melhor a repetições altas e amplitude total.';
  if(ex.cat==='comp')return idx===0?'Maior composto do dia: vem primeiro porque com você descansado dá pra mover mais carga com forma limpa, e é daqui que sai o principal estímulo.':'Composto: aproveita a força que ainda resta antes de partir pros isolados.';
  return 'Isolado de '+ex.mus.toLowerCase()+': completa o estímulo do dia com foco total, sem exigir dos músculos auxiliares já cansados.';
}

/* =================== GERADOR =================== */
function buildDay(pool,n,prio){
  const noPrio=Object.keys(GRP_LABEL).filter(g=>!prio.includes(g));
  let items=pool.map(id=>({id,...E[id]}));
  // remove isolados de grupos desmarcados (mantém compostos pra base)
  let removed=items.filter(x=>x.cat!=='comp'&&noPrio.includes(x.grp)&&prio.length>0&&prio.length<8);
  items=items.filter(x=>!removed.includes(x));
  // ordena: comp > iso(prioritário) > iso > calf > core/lomb
  const rank=x=>x.cat==='comp'?0:(x.cat==='iso'?(prio.includes(x.grp)?1:2):(x.cat==='calf'?3:4));
  items.sort((a,b)=>rank(a)-rank(b));
  if(items.length<n)items=items.concat(removed); // repõe se faltar
  const coresArr=items.filter(x=>['core','lomb'].includes(x.cat));
  const restArr=items.filter(x=>!['core','lomb'].includes(x.cat));
  let sel;
  if(coresArr.length&&n>=4){sel=restArr.slice(0,n-1);sel.push(coresArr[0])}
  else{sel=items.slice(0,n)}
  // se dia tem muitos exercícios, compostos extras caem pra 3 séries
  sel=sel.map((x,i)=>{
    let sets=x.sets;
    if(n>=7&&x.cat==='comp'&&i>0)sets=3;
    return {...x,sets};
  });
  // superset abdutora+adutora se ambos presentes: aproxima e marca
  const ia=sel.findIndex(x=>x.id==='abductor'),ib=sel.findIndex(x=>x.id==='adductor');
  if(ia>=0&&ib>=0){
    const [add]=sel.splice(ib,1);
    sel.splice(sel.findIndex(x=>x.id==='abductor')+1,0,add);
    sel=sel.map(x=>x.id==='abductor'?{...x,ss:'A',rest:0}:x.id==='adductor'?{...x,ss:'A'}:x);
  }
  return sel;
}
function generateProgram(setup){
  const sp=SPLITS[setup.splits];
  let days=sp.days.map(d=>({...d}));
  // região prioritária vira treino A
  const fi=Math.max(0,days.findIndex(d=>d.label===setup.first));
  days=[...days.slice(fi),...days.slice(0,fi)];
  const prog={};
  days.forEach((d,i)=>{
    const L=LETTERS[i];
    const sel=buildDay(d.pool,setup.perDay,setup.groups);
    const ex=sel.map((x,idx)=>({
      id:x.id,fig:x.fig,name:x.name,muscle:x.mus,w:x.w||0,bw:!!x.bw,
      sets:x.sets,reps:x.reps,rest:x.ss==='A'&&x.id==='abductor'?0:x.rest,
      ss:x.ss,yt:x.yt,steps:x.steps,g:x.g,b:x.b,
      why:whyFor(x,idx,true),
      alts:(x.alts||[]).map(aid=>({id:aid,fig:E[aid].fig,name:E[aid].name,w:E[aid].w,bw:!!E[aid].bw,reps:E[aid].reps,yt:E[aid].yt,steps:E[aid].steps,g:E[aid].g,b:E[aid].b}))
    }));
    if(setup.finisher&&(i===0||i===days.length-1)){
      const f=E.finisher;
      ex.push({id:'finisher',fig:f.fig,name:f.name,muscle:f.mus,w:0,bw:true,sets:1,reps:f.reps,rest:0,yt:f.yt,steps:f.steps,g:f.g,b:f.b,why:whyFor(f,99),
        alts:f.alts.map(aid=>({id:aid,fig:E[aid].fig,name:E[aid].name,bw:true,reps:E[aid].reps,yt:E[aid].yt,steps:E[aid].steps,g:E[aid].g,b:E[aid].b}))});
    }
    prog[L]={label:d.label,sub:d.sub,
      intro:`${sp.name} · ${setup.freq}x por semana. Compostos pesados primeiro (você fresco = mais carga = mais estímulo), isolados completam, core fecha.`,
      ex};
  });
  return prog;
}
function weekPlan(setup){
  const keys=LETTERS.slice(0,setup.splits);
  let seq=[];for(let i=0;i<setup.freq;i++)seq.push(keys[i%keys.length]);
  return seq.join(' → ');
}

function ensureProgram(){
  if(!PROGRAM){PROGRAM=generateProgram(SETUP||DEFAULT_SETUP)}

}

const todayISO=()=>{const d=new Date();d.setMinutes(d.getMinutes()-d.getTimezoneOffset());return d.toISOString().slice(0,10)};
function activeOf(ex){
  const vid=VARIANT[ex.id];
  if(vid&&ex.alts){const alt=ex.alts.find(a=>a.id===vid);
    if(alt) return {...ex,...alt,baseId:ex.id,vid:alt.id};}
  return {...ex,baseId:ex.id,vid:ex.id};
}
const wOf=a=>WEIGHTS[a.vid]!=null?WEIGHTS[a.vid]:(a.w||0);
function setsArr(baseId,n){
  if(!SESSION[cur])SESSION[cur]={};
  let s=SESSION[cur][baseId];
  if(!s||s.length!==n){s=Array.from({length:n},()=>({d:false,w:null}));SESSION[cur][baseId]=s}
  else if(typeof s[0]!=='object'||s[0]===null){s=s.map(v=>({d:!!v,w:null}));SESSION[cur][baseId]=s}
  return s;
}
function lastSets(vid,name){
  for(const h of HISTORY){
    if(h.items){const it=h.items.find(x=>x.id===vid||x.n===name);
      if(it)return {sw:it.sw||null,s:it.s,t:it.t,w:it.w!=null?it.w:null}}
    if(h.weights&&h.weights[vid]!=null)return {sw:null,s:null,t:null,w:h.weights[vid]};
  }
  return null;
}
function lastW(vid){
  for(const h of HISTORY){if(h.weights&&h.weights[vid]!=null)return h.weights[vid]}
  return null;
}

const $=id=>document.getElementById(id);
function applyTheme(){
  document.documentElement.setAttribute('data-theme',THEME);
  $('thm').textContent=THEME==='light'?'🌙':'☀️';
  const m=document.querySelector('meta[name=theme-color]');
  if(m)m.setAttribute('content',THEME==='light'?'#F4F5F7':'#0B0C0E');
  applyAccent();
}
function applyAccent(){
  const c=ACCENTS[THEME][cur]||ACCENTS[THEME].A;
  const r=document.documentElement.style;
  r.setProperty('--accent',c.a);r.setProperty('--accent-ink',c.ink);r.setProperty('--accent-text',c.t);
}
$('thm').onclick=()=>{THEME=THEME==='light'?'dark':'light';save('iron_theme',THEME);applyTheme()};

        `<button class="vchip${a.vid===o.id?' on':''}" onclick="setVar('${ex.id}','${o.id}')">${o.name}</button>`).join('')+`</div>`;
    }
    const ebar=EDITMODE?`<div class="ebar">
        <button class="ebtn" onclick="progMove(${i},-1)" ${i===0?'disabled':''}>↑</button>
        <button class="ebtn" onclick="progMove(${i},1)" ${i===day.ex.length-1?'disabled':''}>↓</button>
        <button class="ebtn wide" onclick="progReplace(${i})">⇄ Substituir</button>
        <button class="ebtn danger" onclick="progRemove(${i})">Excluir</button>
      </div>`:'';
    const base=wOf(a);
    const prev=lastSets(a.vid,a.name);
    let prevHtml='';
    if(!EDITMODE&&prev){
      if(prev.sw&&prev.sw.length)prevHtml=`<div class="prev">Anterior: <b>${prev.sw.map(fmtW).join(' · ')} kg</b>${prev.s!=null?` (${prev.s}/${prev.t} séries)`:''}</div>`;
      else if(prev.w!=null)prevHtml=`<div class="prev">Anterior: <b>${fmtW(prev.w)} kg</b></div>`;
      else if(prev.s!=null)prevHtml=`<div class="prev">Anterior: <b>${prev.s}/${prev.t} séries</b></div>`;
    }
    const wDisp=a.bw?`<div class="val"><span class="num" style="font-size:19px">Peso corporal</span></div>`:
      `<button onclick="bump('${ex.id}',-2.5)">−</button>
       <div class="val" onclick="editW(this,'${ex.id}')"><span class="num">${fmtW(base)}</span><span class="u">kg</span></div>
       <button onclick="bump('${ex.id}',2.5)">+</button>`;
    const srows=arr.map((s,si)=>{
      const eff=s.w!=null?s.w:base;
      const wcell=a.bw?`<div class="swt bwlab">corporal</div>`:
        `<div class="swt" onclick="editSetW(this,'${ex.id}',${si})">${fmtW(eff)}<span class="u">kg</span></div>`;
      return `<div class="srow${s.d?' done':''}">

function fmtW(n){return Number.isInteger(n)?n:n.toFixed(1).replace('.',',')}
function updateProgress(){
  const day=PROGRAM[cur];
  let done=0,tot=0;
  day.ex.forEach(ex=>{const a=activeOf(ex);const arr=setsArr(ex.id,a.sets);done+=arr.filter(x=>x.d).length;tot+=a.sets});
  $('pdone').textContent=done;$('ptot').textContent=tot;
  $('pbar').style.width=(tot?done/tot*100:0)+'%';

  if(done>=tot&&tot>0){fb.classList.add('ready');fb.textContent='✓ Concluir treino '+cur}

function setVar(baseId,vid){VARIANT[baseId]=vid;save('iron_variant',VARIANT);cloudSync();renderTrain()}
function findBase(id){for(const k in PROGRAM){const e=PROGRAM[k].ex.find(x=>x.id===id);if(e)return e}}
function bump(baseId,delta){
  const a=activeOf(findBase(baseId));let v=wOf(a)+delta;if(v<0)v=0;
  WEIGHTS[a.vid]=Math.round(v*10)/10;save('iron_weights',WEIGHTS);cloudSync();renderTrain();
}
function editW(el,baseId){
  const a=activeOf(findBase(baseId));const cur0=wOf(a);
  el.innerHTML=`<input type="number" inputmode="decimal" step="2.5" value="${cur0}">`;
  const inp=el.querySelector('input');inp.focus();inp.select();
  const commit=()=>{let v=parseFloat(String(inp.value).replace(',','.'));if(isNaN(v)||v<0)v=cur0;
    WEIGHTS[a.vid]=Math.round(v*10)/10;save('iron_weights',WEIGHTS);cloudSync();toast('Peso salvo: '+fmtW(WEIGHTS[a.vid])+' kg');renderTrain()};
  inp.onblur=commit;inp.onkeydown=e=>{if(e.key==='Enter')inp.blur()};
}
function toggleSet(baseId,si){
  const ex=findBase(baseId);const a=activeOf(ex);const arr=setsArr(baseId,a.sets);
  const s=arr[si];
  s.d=!s.d;
  if(s.d&&s.w==null&&!a.bw)s.w=wOf(a);
  save('iron_session',SESSION);cloudSync();
  const justDone=s.d;renderTrain();
  if(justDone){if(navigator.vibrate)navigator.vibrate(35);
    const allNow=PROGRAM[cur].ex.every(e=>{const aa=activeOf(e);return setsArr(e.id,aa.sets).every(x=>x.d)});
    if(!allNow&&a.rest)startRest(a.rest,a.name);
  }
}
function editSetW(el,baseId,si){
  const ex=findBase(baseId);const a=activeOf(ex);const arr=setsArr(baseId,a.sets);
  const cur0=arr[si].w!=null?arr[si].w:wOf(a);
  el.innerHTML=`<input type="number" inputmode="decimal" step="2.5" value="${cur0}">`;
  const inp=el.querySelector('input');inp.focus();inp.select();
  const commit=()=>{let v=parseFloat(String(inp.value).replace(',','.'));if(isNaN(v)||v<0)v=cur0;
    arr[si].w=Math.round(v*10)/10;save('iron_session',SESSION);cloudSync();
    toast('Série '+(si+1)+': '+fmtW(arr[si].w)+' kg');renderTrain()};
  inp.onblur=commit;inp.onkeydown=e=>{if(e.key==='Enter')inp.blur()};
}

function renderProgress(){
  const pv=$('progView');

  const last7=new Set();

  const total=HISTORY.length;
  const streak=calcStreak();
  const wd=['S','T','Q','Q','S','S','D'];
  const monday=new Date(now);const dow=(now.getDay()+6)%7;monday.setDate(now.getDate()-dow);
  let daysHtml='';
  for(let i=0;i<7;i++){const d=new Date(monday);d.setDate(monday.getDate()+i);
    const iso=d.toISOString().slice(0,10);
    const hit=HISTORY.find(h=>h.date===iso);

  }

  const wkLabel=mon=>{const a=new Date(mon+'T00:00');const b=new Date(a);b.setDate(a.getDate()+6);
    const f=x=>x.toLocaleDateString('pt-BR',{day:'2-digit',month:'short'});return 'Semana de '+f(a)+' a '+f(b)};
  let lastWk=null;
  const hist=HISTORY.length?HISTORY.map((h,i)=>{
    const d=new Date(h.date+'T00:00');
    const ds=d.toLocaleDateString('pt-BR',{weekday:'short',day:'2-digit',month:'short'});

    lastWk=wk;
    const det=h.items?h.items.map(it=>{
      const wtx=(it.sw&&it.sw.length)?it.sw.map(fmtW).join(' · ')+' kg':(it.w!=null?fmtW(it.w)+' kg':'');
      return `<div class="hd-row"><span>${it.n}</span><small>${it.s}/${it.t} séries${wtx?' · '+wtx:''}</small></div>`}).join(''):
      (h.weights&&Object.keys(h.weights).length?Object.entries(h.weights).map(([vid,w])=>
      `<div class="hd-row"><span>${vidName(vid)}</span><small>${fmtW(w)} kg</small></div>`).join(''):
      '<div class="hd-row"><span>Sem detalhes salvos nesta sessão</span></div>');
    return `${head}<div class="hrow" onclick="toggleHist(${i})" id="hr${i}">
      <div class="wk" style="background:${HIST_COLORS[h.workout]||'#F5B301'}">${h.workout}</div>
      <div class="mid"><b>${h.label} · Treino ${h.workout}</b><small>${ds} · ${h.done}/${h.tot} séries</small></div>
      <div class="pct">${pct}%</div><span class="hcv">▾</span></div>
      <div class="hdetail" id="hd${i}">${det}<button class="hdel" onclick="delHist(${i})">Excluir este registro</button></div>`;
  }).join(''):'<div class="empty">Nenhum treino registrado ainda.<br>Conclua um treino e ele aparece aqui. 📈</div>';
  const plan=SETUP?`<div class="tip"><div class="ic">📅</div><p><b>Sua semana:</b> ${weekPlan(SETUP)} (${SETUP.freq}x). Nos outros dias, descanso ou caminhada leve.</p></div>`:'';

  pv.innerHTML=`
    <div class="stats">
      <div class="stat"><div class="v">${last7.size}</div><div class="k">Esta semana</div></div>
      <div class="stat"><div class="v">${streak}</div><div class="k">Sequência (sem)</div></div>

      <button class="abtn vid" onclick="exportXLSX()">📊 Exportar Excel</button>
      <button class="abtn" onclick="exportPDF()">📄 Exportar PDF</button>

      <button class="abtn" onclick="openWizard(true)">⚙️ Personalizar meu treino</button>

      <div class="sectit" style="font-size:14px">Princípios do Dr. 🧬</div>
      ${plan}
      <div class="tip"><div class="ic">📈</div><p><b>Progressão dupla:</b> fechou o topo das reps em todas as séries (com 2 na reserva)? Sobe ~5% na carga e volta pro fundo da faixa.</p></div>

function delHist(i){
  if(!confirm('Excluir este registro do histórico?'))return;
  HISTORY.splice(i,1);save('iron_history',HISTORY);cloudSync();
  renderProgress();toast('Registro excluído');
}
function toggleHist(i){
  const d=$('hd'+i),r=$('hr'+i);
  if(d){d.classList.toggle('op');r.classList.toggle('op')}
}
function calcStreak(){
  if(!HISTORY.length)return 0;
  const weeks=new Set();
  HISTORY.forEach(h=>{const d=new Date(h.date+'T00:00');const oneJan=new Date(d.getFullYear(),0,1);
    const wk=d.getFullYear()+'-'+Math.ceil(((d-oneJan)/864e5+oneJan.getDay()+1)/7);weeks.add(wk)});
  const now=new Date();const oneJan=new Date(now.getFullYear(),0,1);
  let wkNum=Math.ceil(((now-oneJan)/864e5+oneJan.getDay()+1)/7);
  let streak=0;
  while(weeks.has(now.getFullYear()+'-'+wkNum)){streak++;wkNum--}
  return streak;
}
function clearHist(){
  if(confirm('Apagar todo o histórico de treinos? Os pesos atuais são mantidos.')){
    HISTORY=[];save('iron_history',HISTORY);cloudSync();renderProgress();toast('Histórico limpo');
  }
}

function buildItem(id,whyTxt){const x=E[id];

function insertPos(arr,cat){
  let pos=arr.findIndex(e=>{const le=E[e.id];return le&&['core','lomb','cardio'].includes(le.cat)});
  if(['core','lomb'].includes(cat))pos=arr.findIndex(e=>{const le=E[e.id];return le&&le.cat==='cardio'});
  return pos<0?arr.length:pos;
}

function pickChoose(id){
  const ctx=PICKCTX;if(!ctx)return;
  const item=buildItem(id, ctx.replaceIdx!=null?whyFor(E[id],ctx.replaceIdx):'Extra que você escolheu: '+whyFor(E[id],5));
  if(ctx.replaceIdx!=null){
    const old=ctx.list[ctx.replaceIdx];
    ctx.list.splice(ctx.replaceIdx,1,item);
    cleanupEx(ctx.dayKey,old.id);
  }else{
    ctx.list.splice(insertPos(ctx.list,E[id].cat),0,item);
  }
  $('pickOv').classList.add('hidden');
  if(ctx.mode==='wizard'){renderOB()}
  else{save('iron_program',PROGRAM);cloudSync();renderTrain()}
  toast(ctx.replaceIdx!=null?'Substituído por '+item.name:item.name+' adicionado');
}

async function cloudPush(){

  save('iron_updated',payload.updated);

async function cloudPull(){
  try{
    const {data,error}=await sb.from('workout_data').select('payload').eq('user_id',sbUser.id).maybeSingle();
    if(error)return;
    if(!data){cloudPush();return}
    const p=data.payload||{};
    const seen=new Set(HISTORY.map(h=>h.ts));
    (p.history||[]).forEach(h=>{if(!seen.has(h.ts))HISTORY.push(h)});
    HISTORY.sort((a,b)=>(b.ts||0)-(a.ts||0));
    const localUpd=load('iron_updated',0);
    if((p.updated||0)>localUpd){
      WEIGHTS={...WEIGHTS,...(p.weights||{})};
      VARIANT={...VARIANT,...(p.variant||{})};
      SESSION={...SESSION,...(p.session||{})};
      if(p.program){PROGRAM=p.program;save('iron_program',PROGRAM)}
      if(p.setup){SETUP=p.setup;save('iron_setup',SETUP);closeOB()}
    }
    save('iron_history',HISTORY);save('iron_weights',WEIGHTS);
    save('iron_variant',VARIANT);save('iron_session',SESSION);
    render();toast('☁️ Dados sincronizados');

}

async function doAuth(){

async function ensureXLSX(){if(!window.XLSX)await loadScript('https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js')}
async function ensurePDF(){
  if(!window.jspdf)await loadScript('https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js');
  if(!(window.jspdf&&window.jspdf.jsPDF&&window.jspdf.jsPDF.API.autoTable))await loadScript('https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js');
}
function vidName(vid){
  if(E[vid])return E[vid].name;
  for(const k in PROGRAM){for(const ex of PROGRAM[k].ex){
    if(ex.id===vid)return ex.name;
    if(ex.alts){const a=ex.alts.find(x=>x.id===vid);if(a)return a.name}
  }}
  return vid;
}
function fmtBR(iso){const d=new Date(iso+'T00:00');return d.toLocaleDateString('pt-BR')}
async function exportXLSX(){
  if(!HISTORY.length){toast('Sem treinos registrados ainda');return}
  toast('Gerando Excel...');
  try{await ensureXLSX()}catch(e){toast('Precisa de internet pra gerar o arquivo');return}
  const s1=[['Data','Treino','Nome','Séries feitas','Séries totais','Conclusão']];
  [...HISTORY].reverse().forEach(h=>s1.push([fmtBR(h.date),h.workout,h.label,h.done,h.tot,Math.round(h.done/h.tot*100)+'%']));
  const s2=[['Data','Treino','Exercício','Carga (kg)']];
  [...HISTORY].reverse().forEach(h=>{if(h.weights)Object.entries(h.weights).forEach(([vid,w])=>s2.push([fmtBR(h.date),h.workout,vidName(vid),w]))});
  const wb=XLSX.utils.book_new();
  const ws1=XLSX.utils.aoa_to_sheet(s1);ws1['!cols']=[{wch:12},{wch:7},{wch:16},{wch:13},{wch:13},{wch:11}];
  const ws2=XLSX.utils.aoa_to_sheet(s2);ws2['!cols']=[{wch:12},{wch:7},{wch:30},{wch:11}];
  XLSX.utils.book_append_sheet(wb,ws1,'Sessões');
  XLSX.utils.book_append_sheet(wb,ws2,'Cargas');
  XLSX.writeFile(wb,'iron_treinos_'+todayISO()+'.xlsx');
  toast('Excel gerado ✔');
}
async function exportPDF(){
  if(!HISTORY.length){toast('Sem treinos registrados ainda');return}
  toast('Gerando PDF...');
  try{await ensurePDF()}catch(e){toast('Precisa de internet pra gerar o arquivo');return}
  const {jsPDF}=window.jspdf;const doc=new jsPDF();
  doc.setFontSize(18);doc.setTextColor(20);doc.text('IRON · Relatório de Treinos',14,18);
  doc.setFontSize(10);doc.setTextColor(120);
  doc.text(((SETUP&&SETUP.name)?SETUP.name:'IRON')+' · gerado em '+new Date().toLocaleDateString('pt-BR'),14,25);
  doc.autoTable({startY:32,
    head:[['Data','Treino','Séries','Conclusão']],
    body:[...HISTORY].reverse().map(h=>[fmtBR(h.date),h.workout+' · '+h.label,h.done+'/'+h.tot,Math.round(h.done/h.tot*100)+'%']),
    headStyles:{fillColor:[245,179,1],textColor:[24,24,24],fontStyle:'bold'},
    styles:{fontSize:9},alternateRowStyles:{fillColor:[246,247,249]}});
  const rows=[];
  [...HISTORY].reverse().forEach(h=>{if(h.weights)Object.entries(h.weights).forEach(([vid,w])=>rows.push([fmtBR(h.date),h.workout,vidName(vid),String(w).replace('.',',')+' kg']))});
  if(rows.length){
    doc.setFontSize(13);doc.setTextColor(20);
    const y=doc.lastAutoTable.finalY+12;
    doc.text('Cargas por exercício',14,y);
    doc.autoTable({startY:y+4,
      head:[['Data','Treino','Exercício','Carga']],body:rows,
      headStyles:{fillColor:[24,24,24]},styles:{fontSize:8.5},
      alternateRowStyles:{fillColor:[246,247,249]}});
  }
  doc.save('iron_treinos_'+todayISO()+'.pdf');
  toast('PDF gerado ✔');
}
